<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Applications — Golden Announcements</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== YOUR ORIGINAL STYLES (UNCHANGED AREA) ===== */
/* KEEP ALL YOUR EXISTING CSS HERE ABOVE IF YOU HAD MORE */

/* ADMIN BUTTON */
#adminBtn {
  position: fixed;
  top: 15px;
  right: 15px;
  background: #0d0e11;
  color: #f0b429;
  border: 1px solid rgba(240,180,41,0.4);
  padding: 8px 12px;
  font-size: 12px;
  cursor: pointer;
  z-index: 9999;
  transition: 0.2s;
}

#adminBtn:hover {
  transform: scale(1.05);
}

/* ===== YOUR ORIGINAL CSS CONTINUES BELOW ===== */

</style>
</head>

<body>

<!-- ADMIN BUTTON -->
<button id="adminBtn" onclick="openAdmin()">Admin</button>

<!-- ================= YOUR ORIGINAL HTML (RESTORED) ================= -->

<div class="page-wrap">

  <div class="header">
    <div class="header-badge">⚔ Golden Announcements</div>
    <h1>Staff <span>Applications</span></h1>
    <p>Join the team. Select a role below, fill out the form, and apply.</p>
  </div>

  <!-- ROLE CARDS -->
  <div class="roles-grid" id="rolesGrid">

    <div class="role-card" data-role="Chat Moderator" data-icon="🛡️" onclick="selectRole(this)">
      <span class="role-icon">🛡️</span>
      <div class="role-title">Chat Moderator</div>
    </div>

    <div class="role-card" data-role="Helper" data-icon="🤝" onclick="selectRole(this)">
      <span class="role-icon">🤝</span>
      <div class="role-title">Helper</div>
    </div>

    <div class="role-card" data-role="Minecraft Chat Moderator" data-icon="⛏️" onclick="selectRole(this)">
      <span class="role-icon">⛏️</span>
      <div class="role-title">Minecraft Chat Mod</div>
    </div>

  </div>

  <!-- FORM -->
  <div class="form-wrap" id="formWrap">

    <form id="appForm" onsubmit="submitForm(event)">

      <input id="discordUser" placeholder="Discord Username" required>
      <input id="age" type="number" placeholder="Age" required>

      <select id="timezone" required>
        <option value="">Timezone</option>
        <option>UTC+5:30</option>
      </select>

      <select id="hours" required>
        <option value="">Hours</option>
        <option>1–2</option>
        <option>3–4</option>
        <option>5+</option>
      </select>

      <textarea id="why" placeholder="Why do you want this role?" required></textarea>
      <textarea id="experience" placeholder="Experience" required></textarea>
      <textarea id="scenario" placeholder="Scenario question" required></textarea>
      <textarea id="extra" placeholder="Extra info"></textarea>

      <div id="mcUserGroup" style="display:none">
        <input id="mcUser" placeholder="Minecraft Username">
      </div>

      <button type="submit" id="submitBtn">Submit</button>

    </form>
  </div>

  <!-- SUCCESS -->
  <div class="success-screen" id="successScreen">
    <h2>Submitted!</h2>
    <div id="successId"></div>
    <button onclick="resetForm()">Back</button>
  </div>

</div>

<!-- ================= JS ================= -->

<script>
let selectedRole = null;

/* ROLE SELECT */
function selectRole(card) {
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');

  selectedRole = card.dataset.role;

  document.getElementById('formWrap').style.display = 'block';

  const mc = document.getElementById('mcUserGroup');
  mc.style.display = selectedRole === 'Minecraft Chat Moderator' ? 'block' : 'none';
}

/* SUBMIT */
async function submitForm(e) {
  e.preventDefault();

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;

  const applicationData = {
    role: selectedRole,
    minecraft_user: document.getElementById('mcUser').value || null,
    discord_user: document.getElementById('discordUser').value,
    age: Number(document.getElementById('age').value),
    timezone: document.getElementById('timezone').value,
    hours: document.getElementById('hours').value,
    why: document.getElementById('why').value,
    experience: document.getElementById('experience').value,
    scenario: document.getElementById('scenario').value,
    extra: document.getElementById('extra').value,
    status: 'Pending'
  };

  const { data, error } = await supabase
    .from('applications')
    .insert([applicationData])
    .select();

  if (error) {
    alert(error.message);
    btn.disabled = false;
    return;
  }

  document.getElementById('successId').textContent =
    'ID: ' + data[0].id;

  document.getElementById('formWrap').style.display = 'none';
  document.getElementById('successScreen').style.display = 'block';
}

/* RESET */
function resetForm() {
  location.reload();
}

/* ADMIN LOGIN */
function openAdmin() {
  const pass = prompt("Enter admin password:");

  if (pass === "admingoldenheart@67") {
    window.location.href = "admin.html";
  } else {
    alert("Wrong password");
  }
}
</script>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://aonbofzvaqymcjzpnxnf.supabase.co";
const supabaseKey = "sb_publishable_vL_ovctvXE0kbpvTrWNaCw_Wps0xj6y";

const supabase = window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);
</script>

</body>
</html>
