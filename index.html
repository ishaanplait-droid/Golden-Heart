<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Applications — Golden Announcements</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ADMIN BUTTON */
#adminBtn {
  position: fixed;
  top: 15px;
  right: 15px;
  background: #0d0e11;
  color: #f0b429;
  border: 1px solid rgba(240,180,41,0.4);
  padding: 8px 12px;
  font-size: 12px;
  cursor: pointer;
  z-index: 9999;
  transition: 0.2s;
}

#adminBtn:hover {
  opacity: 1;
  transform: scale(1.05);
}

</style>
</head>

<body>

<!-- ADMIN BUTTON -->
<button id="adminBtn" onclick="openAdmin()">Admin</button>

<!-- ================= YOUR HTML CONTENT STAYS HERE ================= -->

<script>
const roleRequirements = {
  'Chat Moderator': [
    'Active in Discord daily',
    'Minimum age: 13',
    'Good knowledge of server rules',
    'Calm under pressure',
    'No recent warns or bans',
    'Microphone preferred'
  ],
  'Helper': [
    'Friendly and patient',
    'Minimum age: 13',
    'Active in the community',
    'Willing to learn',
    'No recent warns or bans',
    'Available 1+ hrs/day'
  ],
  'Minecraft Chat Moderator': [
    'Active Minecraft player',
    'Minimum age: 13',
    'Familiar with server plugins',
    'Good knowledge of rules',
    'No recent warns or bans',
    'Respond quickly in-game'
  ]
};

let selectedRole = null;

function selectRole(card) {
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');

  selectedRole = card.dataset.role;

  document.getElementById('formIcon').textContent = card.dataset.icon;
  document.getElementById('formTitle').textContent = selectedRole + ' Application';

  const reqs = roleRequirements[selectedRole] || [];
  document.getElementById('reqList').innerHTML =
    reqs.map(r => `<li>${r}</li>`).join('');

  const mc = document.getElementById('mcUserGroup');
  mc.style.display = selectedRole === 'Minecraft Chat Moderator' ? 'block' : 'none';

  document.getElementById('mcUser').required =
    selectedRole === 'Minecraft Chat Moderator';

  document.getElementById('formWrap').classList.add('visible');
}

function countChars(id, countId, max) {
  const len = document.getElementById(id).value.length;
  const el = document.getElementById(countId);
  el.textContent = `${len} / ${max}`;
}

async function submitForm(e) {
  e.preventDefault();

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  const applicationData = {
    role: selectedRole,
    minecraft_user:
      selectedRole === 'Minecraft Chat Moderator'
        ? document.getElementById('mcUser').value
        : null,
    discord_user: document.getElementById('discordUser').value,
    age: Number(document.getElementById('age').value) || null,
    timezone: document.getElementById('timezone').value,
    hours: document.getElementById('hours').value,
    why: document.getElementById('why').value,
    experience: document.getElementById('experience').value,
    scenario: document.getElementById('scenario').value,
    extra: document.getElementById('extra').value,
    status: 'Pending'
  };

  const { data, error } = await supabase
    .from('applications')
    .insert([applicationData])
    .select();

  if (error) {
    alert('Error: ' + error.message);
    btn.disabled = false;
    btn.textContent = 'Submit Application';
    return;
  }

  document.getElementById('formWrap').style.display = 'none';
  document.getElementById('rolesGrid').style.display = 'none';

  document.getElementById('successId').textContent =
    'Application ID: ' + data[0].id;

  document.getElementById('successScreen').classList.add('visible');
}

function resetForm() {
  document.getElementById('appForm').reset();
  document.getElementById('formWrap').style.display = '';
  document.getElementById('rolesGrid').style.display = '';
  document.getElementById('successScreen').classList.remove('visible');

  document.querySelectorAll('.role-card').forEach(c =>
    c.classList.remove('selected')
  );

  selectedRole = null;
}

/* ADMIN LOGIN */
function openAdmin() {
  const pass = prompt("Enter admin password:");

  if (pass === "admingoldenheart@67") {
    window.location.href = "admin.html";
  } else {
    alert("Wrong password");
  }
}
</script>

</body>
